services:
  trans-flow:
    build: .
    image: trans-flow:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NLLW_HOST_PORT:-18765}:${NLLW_PORT:-18765}"
    volumes:
      # Bind-mount model caches to the project directory so first download is reused
      # across container restarts/rebuilds and can be backed up explicitly.
      - ./model-cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import json,os,urllib.request; port=os.environ.get('NLLW_PORT','18765'); r=urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=3); assert json.load(r).get('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s
